spring:
  application:
    name: qiniuyun-backend

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/voice_input?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.qiniuyun.model.entity
  configuration:
    map-underscore-to-camel-case: true

audio:
  upload-dir: ${AUDIO_UPLOAD_DIR:./uploads/audio}

vosk:
  model-path: ${VOSK_MODEL_PATH:models/vosk-model-small-cn-0.22}
  sample-rate: 16000

asr:
  default-engine: vosk

server:
  port: 8080
