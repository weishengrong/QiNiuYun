spring:
  application:
    name: qiniuyun-backend

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/voice_input?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: root
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.qiniuyun.model.entity
  configuration:
    map-underscore-to-camel-case: true

audio:
  upload-dir: ${AUDIO_UPLOAD_DIR:./uploads/audio}

vosk:
  model-path: D:/Workspace/official_workspace/QiNiuYun_front_web/QiNiuYun_VoiceInput/models/vosk-model-small-cn-0.22
  sample-rate: 16000

asr:
  default-engine: vosk

stepfun:
  asr:
    token: ${STEPFUN_API_TOKEN:}
    stream-url: wss://api.stepfun.com/v1/realtime/asr/stream
    model: step-asr-1.1-stream
    language: zh
    sample-rate: 16000
    silence-duration-ms: 800
    vad-threshold: 0.5
    enable-itn: true

server:
  port: 8080
